---
# Frontend IngressRoute (HTTP for local development)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-http
  namespace: blog-frontend
  labels:
    app: frontend
    tier: frontend
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`blog.local.k3s`)
      kind: Rule
      services:
        - name: frontend
          namespace: blog-frontend
          port: 80
