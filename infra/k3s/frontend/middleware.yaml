---
# Traefik Middleware: Security Headers
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: blog-frontend
spec:
  headers:
    customResponseHeaders:
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
    sslRedirect: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
---
# Traefik Middleware: Rate Limiting for Frontend
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: frontend-rate-limit
  namespace: blog-frontend
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1m
---
# Traefik Middleware: HTTPS Redirect
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: blog-frontend
spec:
  redirectScheme:
    scheme: https
    permanent: true
