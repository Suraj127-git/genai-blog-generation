---
# Certificate for Frontend (blog.yourdomain.com)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frontend-cert
  namespace: blog-frontend
spec:
  secretName: frontend-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - blog.yourdomain.com
  - www.blog.yourdomain.com
---
# Certificate for Backend API (api.yourdomain.com)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: backend-cert
  namespace: blog-backend
spec:
  secretName: backend-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.yourdomain.com
