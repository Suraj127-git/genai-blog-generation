---
# Backend API IngressRoute (HTTP for local development)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: backend-http
  namespace: blog-backend
  labels:
    app: backend
    tier: backend
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.local.k3s`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          namespace: blog-backend
          port: 8000
      middlewares:
        - name: api-cors
          namespace: blog-backend
        - name: strip-api-prefix
          namespace: blog-backend
